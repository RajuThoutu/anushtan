  <line x1="155" y1="530" x2="155" y2="560" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="700" y1="530" x2="700" y2="560" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
